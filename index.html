<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mars Attendance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div>
        <h1>Mars Attendance</h1>
        <div class="subtitle"><a href="https://arjunmanigandan.vercel.app/" target="_blank" rel="noopener" class="footer-link">Created by ARJUN M</a></div>
      </div>
      <button class="theme-btn" id="themeToggle" title="Toggle theme">&#9790;</button>
    </div>

    <!-- Add Student -->
    <div class="add-section">
      <div class="add-row">
        <input type="text" id="addName" placeholder="Student name" maxlength="50">
        <select id="addClass">
          <option value="" disabled selected>Class</option>
          <option value="10">10th</option>
          <option value="12">12th</option>
        </select>
        <select id="addCategory">
          <option value="" disabled selected>Select</option>
          <option value="hostel">Hostel</option>
          <option value="bus">Bus</option>
        </select>
        <button class="add-btn" id="addBtn">+ Add</button>
      </div>
    </div>

    <!-- Category filter -->
    <div class="filters" id="categoryFilters">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="hostel">Hostel</button>
      <button class="filter-btn" data-cat="bus">Bus</button>
    </div>

    <!-- Date navigation -->
    <div class="date-nav">
      <div class="date-center">
        <span class="date-label" id="dateLabel"></span>
        <div class="cal-wrap">
          <input type="date" id="datePicker" class="cal-btn" title="Select date">
        </div>
      </div>
      <div class="date-nav-btns">
        <button class="today-btn" id="todayBtn">Today</button>
      </div>
    </div>

    <!-- Session selector -->
    <div class="session-tabs" id="sessionTabs">
      <button class="session-tab active" data-session="morning">☀️ Morning</button>
      <button class="session-tab" data-session="afternoon">🌤️ Afternoon</button>
    </div>

    <!-- Student list -->
    <div class="student-list" id="studentList"></div>

    <!-- Reports -->
    <div class="reports-section">
      <h2>Reports</h2>
      <div class="report-tabs">
        <button class="report-tab active" data-report="daily">Daily</button>
        <button class="report-tab" data-report="weekly">Weekly</button>
        <button class="report-tab" data-report="monthly">Monthly</button>
      </div>
      <div id="reportContent"></div>
    </div>

    <!-- Print -->
    <div class="print-section">
      <h2>Print Attendance</h2>
      <div class="print-row">
        <input type="date" id="printDate" class="print-date">
        <button class="print-btn" id="printBtn">Print</button>
      </div>
    </div>
    <div class="footer">
      Mars Attendance &copy;2026 All Rights Reserved &mdash; <a href="https://arjunmanigandan.vercel.app/" target="_blank" rel="noopener" class="footer-link">Contact Developer</a>
    </div>
  </div>

  <div id="printReport"></div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h3>Edit Student</h3>
      <label for="editName">Name</label>
      <input type="text" id="editName" maxlength="50">
      <label for="editClass">Class</label>
      <select id="editClass">
        <option value="" disabled>Class</option>
        <option value="10">10th</option>
        <option value="12">12th</option>
      </select>
      <label for="editCategory">Category</label>
      <select id="editCategory">
        <option value="" disabled>Select</option>
        <option value="hostel">Hostel</option>
        <option value="bus">Bus</option>
      </select>
      <div class="modal-btns">
        <button class="cancel-btn" id="cancelEdit">Cancel</button>
        <button class="save-btn" id="saveEdit">Save</button>
      </div>
    </div>
  </div>

  <script>
    // ===== STATE =====
    function loadData(key, fallback) {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    }
    const DEFAULT_STUDENTS = [
      { id: 1,  name: 'Jeevikasri',     class: '10', category: 'bus' },
      { id: 2,  name: 'Pavithra',       class: '12', category: 'bus' },
      { id: 3,  name: 'Yuvabharathi',   class: '12', category: 'hostel' },
      { id: 4,  name: 'Aariz Ahamed',   class: '12', category: 'hostel' },
      { id: 5,  name: 'Arjun',          class: '12', category: 'bus' },
      { id: 6,  name: 'Ashwin',         class: '10', category: 'bus' },
      { id: 7,  name: 'Ashwinth',       class: '10', category: 'hostel' },
      { id: 8,  name: 'Harish',         class: '12', category: 'bus' },
      { id: 9,  name: 'Harish Dev',     class: '10', category: 'hostel' },
      { id: 10, name: 'Jai Kishore',    class: '10', category: 'hostel' },
      { id: 11, name: 'Karthi',         class: '10', category: 'hostel' },
      { id: 12, name: 'Kowshik',        class: '10', category: 'bus' },
      { id: 13, name: 'Mano',           class: '12', category: 'hostel' },
      { id: 14, name: 'Prasanna',       class: '10', category: 'hostel' },
      { id: 15, name: 'Praveen Kumar',  class: '12', category: 'bus' },
      { id: 16, name: 'Ram Prasad',     class: '10', category: 'hostel' },
      { id: 17, name: 'Ravi',           class: '12', category: 'hostel' },
      { id: 18, name: 'Thilak Raj',     class: '12', category: 'bus' },
      { id: 19, name: 'Vasistan',       class: '12', category: 'hostel' },
      { id: 20, name: 'Vignesh',        class: '10', category: 'hostel' },
    ];
    let students = loadData('marsStudents', DEFAULT_STUDENTS);
    let attendance = loadData('marsAttendance', {});
    let currentDate = new Date();
    let currentFilter = 'all';
    let currentSession = 'morning';
    let currentReport = 'daily';
    let isDark = localStorage.getItem('marsTheme') === 'dark';
    let editingId = null;
    let nextId = parseInt(localStorage.getItem('marsNextId')) || 21;

    // ===== DOM REFS =====
    const studentList = document.getElementById('studentList');
    const dateLabel = document.getElementById('dateLabel');
    const datePicker = document.getElementById('datePicker');
    const reportContent = document.getElementById('reportContent');
    const themeToggle = document.getElementById('themeToggle');
    const addName = document.getElementById('addName');
    const addClass = document.getElementById('addClass');
    const addCategory = document.getElementById('addCategory');
    const addBtn = document.getElementById('addBtn');
    const editModal = document.getElementById('editModal');
    const editName = document.getElementById('editName');
    const editClass = document.getElementById('editClass');
    const editCategory = document.getElementById('editCategory');
    const saveEdit = document.getElementById('saveEdit');
    const cancelEdit = document.getElementById('cancelEdit');

    // ===== HELPERS =====
    function formatDate(d) {
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    }
    function toKey(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }
    function getWeekRange(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const mon = new Date(d.setDate(diff));
      const sun = new Date(mon);
      sun.setDate(mon.getDate() + 6);
      return { start: mon, end: sun };
    }
    function getMonthRange(date) {
      const d = new Date(date);
      const start = new Date(d.getFullYear(), d.getMonth(), 1);
      const end = new Date(d.getFullYear(), d.getMonth() + 1, 0);
      return { start, end };
    }

    // ===== SESSION HELPERS =====
    function getSessionAtt(dateKey, studentId, session) {
      const dayData = attendance[dateKey];
      if (!dayData) return null;
      const val = dayData[studentId];
      if (val === undefined) return null;
      if (typeof val === 'string') return val;
      return val[session] || null;
    }

    function setSessionAtt(dateKey, studentId, session, status) {
      if (!attendance[dateKey]) attendance[dateKey] = {};
      const dayData = attendance[dateKey];
      const current = dayData[studentId];

      if (!current || typeof current === 'string') {
        const oldStatus = typeof current === 'string' ? current : null;
        dayData[studentId] = session === 'morning'
          ? { morning: status, afternoon: oldStatus }
          : { morning: oldStatus, afternoon: status };
      } else {
        current[session] = status;
      }

      const d = dayData[studentId];
      if ((!d.morning || d.morning === null) && (!d.afternoon || d.afternoon === null)) {
        delete dayData[studentId];
      }
      if (Object.keys(dayData).length === 0) delete attendance[dateKey];
    }

    // ===== STUDENT CRUD =====
    function saveStudents() {
      localStorage.setItem('marsStudents', JSON.stringify(students));
      localStorage.setItem('marsNextId', nextId);
    }

    function addStudent() {
      const name = addName.value.trim();
      if (!name) return;
      const cls = addClass.value;
      const category = addCategory.value;
      if (!cls || !category) return;
      students.push({ id: nextId++, name, class: cls, category });
      saveStudents();
      addName.value = '';
      addClass.value = '';
      addCategory.value = '';
      render();
      addName.focus();
    }

    function deleteStudent(id) {
      if (!confirm('Delete this student?')) return;
      students = students.filter(s => s.id !== id);
      // clean up attendance records for this student
      Object.keys(attendance).forEach(dateKey => {
        if (attendance[dateKey][id] !== undefined) {
          delete attendance[dateKey][id];
        }
        if (attendance[dateKey] && Object.keys(attendance[dateKey]).length === 0) {
          delete attendance[dateKey];
        }
      });
      localStorage.setItem('marsAttendance', JSON.stringify(attendance));
      saveStudents();
      render();
    }

    function openEdit(student) {
      editingId = student.id;
      editName.value = student.name;
      editClass.value = student.class || '10';
      editCategory.value = student.category;
      editModal.classList.add('show');
      editName.focus();
    }

    function closeEdit() {
      editingId = null;
      editModal.classList.remove('show');
    }

    function saveEditStudent() {
      const name = editName.value.trim();
      if (!name || editingId === null) return;
      const student = students.find(s => s.id === editingId);
      if (!student) return;
      student.name = name;
      student.class = editClass.value;
      student.category = editCategory.value;
      saveStudents();
      closeEdit();
      render();
    }

    // ===== THEME =====
    function applyTheme() {
      if (isDark) {
        document.body.classList.add('dark');
        themeToggle.innerHTML = '&#9728;';
      } else {
        document.body.classList.remove('dark');
        themeToggle.innerHTML = '&#9790;';
      }
      localStorage.setItem('marsTheme', isDark ? 'dark' : 'light');
    }
    themeToggle.addEventListener('click', () => {
      isDark = !isDark;
      applyTheme();
    });
    applyTheme();

    // ===== RENDER =====
    function render() {
      const key = toKey(currentDate);
      const filtered = students.filter(s => {
        if (currentFilter === 'all') return true;
        if (currentFilter === 'both') return s.category === 'both';
        return s.category === currentFilter || s.category === 'both';
      });

      dateLabel.textContent = formatDate(currentDate);
      datePicker.value = toKey(currentDate);
      dateLabel.style.animation = 'none';
      dateLabel.offsetHeight;
      dateLabel.style.animation = 'dateFlip 0.35s var(--ease-out)';

      if (filtered.length === 0) {
        studentList.innerHTML = `<div class="empty-state">No students in this category.</div>`;
      } else {
        studentList.innerHTML = filtered.map(s => {
          const status = getSessionAtt(key, s.id, currentSession);
          const catBadge = s.category === 'both' ? 'H+B' : s.category ? s.category.charAt(0).toUpperCase() + s.category.slice(1) : '-';
          const catClass = s.category ? `badge-${s.category}` : 'badge-hostel';
          const clsLabel = s.class === '12' ? '12th' : '10th';
          const btns = [
            { action: 'hostel', label: 'Hostel', short: 'H' },
            { action: 'absent', label: 'Absent', short: 'A' },
            { action: 'present', label: 'Present', short: 'P' },
          ].sort((a, b) => {
            if (a.action === status) return -1;
            if (b.action === status) return 1;
            return 0;
          });
          const cls = (a) => `btn-${a} ${a === status ? 'active' : ''}`;
          const txt = (a) => a === status ? btns.find(b => b.action === a).label : btns.find(b => b.action === a).short;
          return `
            <div class="student-card" data-id="${s.id}">
              <div class="student-info">
                <span class="name">${s.name}</span>
                <span class="badge badge-class">${clsLabel}</span>
                <span class="badge ${catClass}">${catBadge}</span>
              </div>
              <div class="actions">
                <div class="attn-btns">
                  ${btns.map(b => `<button class="${cls(b.action)}" data-action="${b.action}">${txt(b.action)}</button>`).join('')}
                </div>
                <div class="crud-btns">
                  <button class="edit-btn" data-action="edit" title="Edit">&#9998;</button>
                  <button class="del-btn" data-action="delete" title="Delete">&#10005;</button>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }

      renderReport();
    }

    // ===== SMOOTH SLIDE =====
    function slideActiveToFront(card, status) {
      const container = card.querySelector('.attn-btns');
      const btns = [...container.querySelectorAll('button')];

      // Update classes and text
      btns.forEach(b => {
        const a = b.dataset.action;
        const isActive = a === status;
        b.classList.toggle('active', isActive);
        b.textContent = isActive
          ? (a === 'present' ? 'Present' : a === 'absent' ? 'Absent' : 'Hostel')
          : (a === 'present' ? 'P' : a === 'absent' ? 'A' : 'H');
      });

      if (!status) return;

      // FLIP: reorder active button to front with smooth animation
      const activeBtn = container.querySelector('.active');
      if (!activeBtn || btns[0] === activeBtn) return;

      const oldRects = btns.map(b => b.getBoundingClientRect());
      container.prepend(activeBtn);

      // Force layout so new positions are computed
      container.offsetHeight;

      const newBtns = container.querySelectorAll('button');
      newBtns.forEach((b, i) => {
        const newRect = b.getBoundingClientRect();
        const oldRect = oldRects.find((_, idx) => btns[idx] === b);
        if (!oldRect) return;
        const dx = oldRect.left - newRect.left;
        if (dx !== 0) {
          b.animate([
            { transform: `translateX(${dx}px)` },
            { transform: 'translateX(0)' }
          ], {
            duration: 1300,
            easing: 'cubic-bezier(0.16, 1, 0.3, 1)',
            fill: 'both'
          });
        }
      });
    }

    // ===== EVENT LISTENERS =====

    // Add student
    addBtn.addEventListener('click', addStudent);
    addName.addEventListener('keydown', (e) => { if (e.key === 'Enter') addStudent(); });

    // Attendance & CRUD actions
    studentList.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const card = btn.closest('.student-card');
      if (!card) return;
      const id = parseInt(card.dataset.id);
      const action = btn.dataset.action;

      if (action === 'present' || action === 'absent' || action === 'hostel') {
        const key = toKey(currentDate);
        const current = getSessionAtt(key, id, currentSession);
        const newStatus = current === action ? null : action;
        setSessionAtt(key, id, currentSession, newStatus);
        localStorage.setItem('marsAttendance', JSON.stringify(attendance));
        slideActiveToFront(card, newStatus);
        renderReport();
      } else if (action === 'edit') {
        const student = students.find(s => s.id === id);
        if (student) openEdit(student);
      } else if (action === 'delete') {
        deleteStudent(id);
      }
    });

    // Session tabs
    document.getElementById('sessionTabs').addEventListener('click', (e) => {
      const btn = e.target.closest('.session-tab');
      if (!btn) return;
      document.querySelectorAll('.session-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSession = btn.dataset.session;
      render();
    });

    // Category filter
    document.getElementById('categoryFilters').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.cat;
      render();
    });

    // Date nav
    document.getElementById('todayBtn').addEventListener('click', () => {
      currentDate = new Date();
      render();
    });

    // Calendar button
    datePicker.addEventListener('change', () => {
      if (datePicker.value) {
        currentDate = new Date(datePicker.value + 'T00:00:00');
        render();
      }
    });

    // Report tabs
    document.querySelector('.report-tabs').addEventListener('click', (e) => {
      const btn = e.target.closest('.report-tab');
      if (!btn) return;
      document.querySelectorAll('.report-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentReport = btn.dataset.report;
      renderReport();
    });

    // Modal
    saveEdit.addEventListener('click', saveEditStudent);
    cancelEdit.addEventListener('click', closeEdit);
    editModal.addEventListener('click', (e) => { if (e.target === editModal) closeEdit(); });
    editName.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveEditStudent(); });
    editName.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeEdit(); });

    // ===== REPORT RENDER =====
    function renderReport() {
      const { start, end, label } = getReportRange();
      const days = getDaysInRange(start, end);

      const stats = students.map(s => {
        let present = 0;
        let absent = 0;
        let hostel = 0;
        days.forEach(d => {
          const key = toKey(d);
          const mStatus = getSessionAtt(key, s.id, 'morning');
          const aStatus = getSessionAtt(key, s.id, 'afternoon');
          [mStatus, aStatus].forEach(status => {
            if (status === 'present') present++;
            else if (status === 'absent') absent++;
            else if (status === 'hostel') hostel++;
          });
        });
        return { ...s, present, absent, hostel, total: present + absent };
      });

      const totalPresent = stats.reduce((a, s) => a + s.present, 0);
      const totalAbsent = stats.reduce((a, s) => a + s.absent, 0);
      const totalHostel = stats.reduce((a, s) => a + s.hostel, 0);
      const totalSessions = stats.reduce((a, s) => a + s.total, 0);
      const rate = totalSessions > 0 ? Math.round((totalPresent / totalSessions) * 100) : 0;

      const filteredStats = stats.filter(s => {
        if (currentFilter === 'all') return true;
        if (currentFilter === 'both') return s.category === 'both';
        return s.category === currentFilter || s.category === 'both';
      });

      reportContent.innerHTML = `
        <div style="margin-bottom:12px;font-size:13px;color:var(--text2);font-weight:600;">${label}</div>
        <div class="report-stats">
          <div class="stat-card present">
            <div class="stat-num">${totalPresent}</div>
            <div class="stat-label">Present</div>
          </div>
          <div class="stat-card absent">
            <div class="stat-num">${totalAbsent}</div>
            <div class="stat-label">Absent</div>
          </div>
          <div class="stat-card hostel">
            <div class="stat-num">${totalHostel}</div>
            <div class="stat-label">Hostel</div>
          </div>
          <div class="stat-card rate">
            <div class="stat-num">${rate}%</div>
            <div class="stat-label">Attendance</div>
          </div>
        </div>
        ${filteredStats.length > 0 ? `
        <div class="report-detail">
          <table>
            <thead>
              <tr>
                <th>Student</th>
                <th>Class</th>
                <th>Category</th>
                <th>P</th>
                <th>A</th>
                <th>H</th>
                <th>Rate</th>
              </tr>
            </thead>
            <tbody>
              ${filteredStats.map(s => {
                const r = s.total > 0 ? Math.round((s.present / s.total) * 100) : 0;
                const clsLabel = s.class === '12' ? '12th' : '10th';
                return `
                  <tr>
                    <td><strong>${s.name}</strong></td>
                    <td>${clsLabel}</td>
                    <td>${s.category ? s.category.charAt(0).toUpperCase() + s.category.slice(1) : '-'}</td>
                    <td class="status-present">${s.present}</td>
                    <td class="status-absent">${s.absent}</td>
                    <td class="status-hostel">${s.hostel}</td>
                    <td><strong>${r}%</strong></td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
        ` : `<div class="empty-state">No data for this period.</div>`}
      `;
    }

    function getReportRange() {
      const today = new Date();
      today.setHours(0,0,0,0);

      if (currentReport === 'daily') {
        const d = new Date(currentDate);
        return { start: d, end: d, label: 'Today (' + formatDate(d) + ')' };
      } else if (currentReport === 'weekly') {
        const { start, end } = getWeekRange(currentDate);
        return { start, end, label: formatDate(start) + ' — ' + formatDate(end) };
      } else {
        const { start, end } = getMonthRange(currentDate);
        return { start, end, label: start.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }) };
      }
    }

    function getDaysInRange(start, end) {
      const days = [];
      const d = new Date(start);
      d.setHours(0,0,0,0);
      const e = new Date(end);
      e.setHours(0,0,0,0);
      while (d <= e) {
        days.push(new Date(d));
        d.setDate(d.getDate() + 1);
      }
      return days;
    }

    // ===== PRINT =====
    document.getElementById('printBtn').addEventListener('click', () => {
      const date = document.getElementById('printDate').value;
      if (!date) { alert('Please select a date.'); return; }

      const key = date;
      const dateStr = new Date(date + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

      let rows = '';
      students.forEach((s, i) => {
        const mStatus = getSessionAtt(key, s.id, 'morning');
        const aStatus = getSessionAtt(key, s.id, 'afternoon');
        const mText = mStatus ? mStatus.charAt(0).toUpperCase() + mStatus.slice(1) : '-';
        const aText = aStatus ? aStatus.charAt(0).toUpperCase() + aStatus.slice(1) : '-';
        const catLabel = s.category.charAt(0).toUpperCase() + s.category.slice(1);
        const clsLabel = s.class === '12' ? '12th' : '10th';
        rows += `<tr><td>${i + 1}</td><td>${s.name}</td><td>${clsLabel}</td><td>${catLabel}</td><td>${mText}</td><td>${aText}</td></tr>`;
      });

      document.getElementById('printReport').innerHTML = `
        <h2>Mars Attendance &mdash; Daily Report</h2>
        <div class="print-sub">${dateStr}</div>
        <table>
          <thead><tr><th>Roll.No</th><th>Name</th><th>Class</th><th>Category</th><th>Morning</th><th>Afternoon</th></tr></thead>
